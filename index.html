<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>#getfitwithpareshsampada</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0d0f14;--card:#161a22;--card2:#1c2230;--border:#252d3d;
  --green:#00e5a0;--orange:#ff7043;--blue:#4d9fff;--purple:#b06cff;--teal:#00c9b1;--yellow:#ffd600;
  --text:#e8ecf4;--muted:#5a6478;--sidebar:68px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── LOGIN ── */
#loginWrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 50% 0%,#162030 0%,var(--bg) 70%)}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;text-align:center}
.login-logo{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--teal));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#000;margin:0 auto 20px}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:32px}
.login-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;font-size:15px;color:var(--text);outline:none;margin-bottom:16px;transition:.2s}
.login-input:focus{border-color:var(--green)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--green),var(--teal));border:none;border-radius:10px;font-size:15px;font-weight:700;color:#000;cursor:pointer;transition:.15s}
.login-btn:hover{opacity:.88}
.login-err{color:var(--orange);font-size:13px;margin-top:10px;min-height:18px}

/* ── LOADING SCREEN ── */
#loadingScreen{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:9998;flex-direction:column;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--muted)}

/* ── SHELL ── */
#app{display:none;height:100vh;overflow:hidden}
#sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:16px 0;z-index:40;gap:4px}
.nav-logo{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--teal));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#000;margin-bottom:12px;cursor:default}
.nav-btn{width:44px;height:44px;border-radius:12px;border:none;background:transparent;color:var(--muted);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.nav-btn:hover,.nav-btn.active{background:var(--card2);color:var(--text)}
#topbar{position:fixed;left:var(--sidebar);right:0;top:0;height:56px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:39}
#coachTitle{font-size:17px;font-weight:700;flex:1}
#clientSelectorWrap select{background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 12px;font-size:13px;cursor:pointer;outline:none}
.topbar-btn{background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 12px;font-size:13px;cursor:pointer;transition:.15s}
.topbar-btn:hover{border-color:var(--green);color:var(--green)}
#main{margin-left:var(--sidebar);margin-top:56px;height:calc(100vh - 56px);overflow-y:auto;padding:24px}
#content{}

/* ── SETTINGS PANEL ── */
#settingsPanel{position:fixed;left:var(--sidebar);top:56px;bottom:0;width:340px;background:var(--card);border-right:1px solid var(--border);z-index:45;transform:translateX(-100%);transition:transform .25s ease;overflow-y:auto;padding:24px}
#settingsPanel.open{transform:translateX(0)}
.settings-title{font-size:16px;font-weight:700;margin-bottom:8px}
.settings-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.client-link-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.client-link-name{flex:1;font-size:13px}
.copy-btn{background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;padding:4px 10px;cursor:pointer;white-space:nowrap;transition:.15s}
.copy-btn:hover{border-color:var(--green);color:var(--green)}

/* ── CARDS / STATS ── */
.section-title{font-size:17px;font-weight:700;margin-bottom:16px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:22px;font-weight:800}
.stat-sub{font-size:12px;color:var(--muted);margin-top:4px}

/* ── RINGS ── */
.rings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;margin-bottom:28px}
.ring-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center}
.ring-wrap{position:relative;width:80px;height:80px;margin:0 auto 10px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800}
.ring-label{font-size:12px;color:var(--muted)}
.ring-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* ── CHARTS ── */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:28px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.chart-title{font-size:14px;font-weight:600;margin-bottom:4px}
.chart-sub{font-size:11px;color:var(--muted);margin-bottom:14px}

/* ── STREAKS ── */
.streak-controls{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.streak-controls label{font-size:12px;color:var(--muted)}
.streak-controls input[type=date]{background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 10px;font-size:12px}
.badge-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.badge{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px}
.week-streak-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.streak-week-label{color:var(--muted);min-width:90px}
.streak-dot{width:10px;height:10px;border-radius:50%}

/* ── NOTES ── */
.note-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.note-date{font-size:11px;color:var(--green);margin-bottom:4px}
.note-text{font-size:13px;line-height:1.5}

/* ── HISTORY TABLE ── */
.history-table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:10px 8px;text-align:left;border-bottom:1px solid var(--border);font-weight:600;white-space:nowrap}
td{padding:9px 8px;border-bottom:1px solid var(--border)}
tr:hover td{background:var(--card2)}
.pagination{display:flex;align-items:center;gap:6px;margin-top:14px;flex-wrap:wrap}
.page-btn{background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:5px 11px;font-size:12px;cursor:pointer;transition:.15s}
.page-btn:hover,.page-btn.active{border-color:var(--green);color:var(--green)}

/* ── MISC ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.big{font-size:48px;margin-bottom:12px}
.error-banner{background:#2a1010;border:1px solid var(--orange);border-radius:10px;padding:14px;color:var(--orange);font-size:13px;margin-bottom:16px}
footer{text-align:center;color:var(--muted);font-size:11px;padding:24px 0 8px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-card">
    <div class="login-logo">PS</div>
    <div class="login-title">PareshSampada</div>
    <div class="login-sub">Coach Dashboard — Sign in to continue</div>
    <input class="login-input" type="password" id="pwInput" placeholder="Enter password" autocomplete="current-password">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Loading…</div>
</div>

<!-- APP SHELL -->
<div id="app">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="nav-logo">PS</div>
    <button class="nav-btn active" id="navReport" title="Dashboard" onclick="showSection('report',this)">📋</button>
    <button class="nav-btn" id="navClients" title="Clients" onclick="showSection('clients',this)" style="display:none">👥</button>
    <button class="nav-btn" id="navSettings" title="Share Links" onclick="toggleSettings()">⚙️</button>
  </nav>

  <!-- Top Bar -->
  <div id="topbar">
    <div id="coachTitle" style="flex:1"></div>
    <div id="clientSelectorWrap">
      <select id="clientSelect" onchange="onClientChange()">
        <option value="">— Select client —</option>
      </select>
    </div>
    <button class="topbar-btn" id="syncBtn" onclick="doSync()" title="Sync">🔄 Sync</button>
    <button class="topbar-btn" id="logoutBtn" onclick="doLogout()">Logout</button>
  </div>

  <!-- Settings Panel -->
  <div id="settingsPanel">
    <div class="settings-title">📋 Client Share Links</div>
    <div class="settings-sub">Send these links to clients. Each link is unique and secure — no password needed.</div>
    <div id="clientLinksList"><div style="color:var(--muted);font-size:13px">Loading…</div></div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="content"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG  — Update API_URL after deploying Code_v5.js
// ═══════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbw-EtFykaGOEXdD2wSf-5UKgNODncQzwPhDWH49W1qZSyvLCNUtq1yACLqXGT9Q4fFY/exec';

// ═══════════════════════════════════════════════════════
// SECURITY — tokens stored in memory only, never in HTML
// ═══════════════════════════════════════════════════════
let SESSION_TOKEN = null;   // coach 24-hour token
let CLIENT_TOKEN  = null;   // client share-link token

const URL_PARAMS   = new URLSearchParams(window.location.search);
const CLIENT_PARAM = URL_PARAMS.get('client');   // ?client=Name
const CTOKEN_PARAM = URL_PARAMS.get('ctoken');   // ?ctoken=xxx

// ═══════════════════════════════════════════════════════
// COLUMN MAPPING & TARGETS
// ═══════════════════════════════════════════════════════
const COL = {
  name:'Client Name', date:'Date', weight:'Weight', fat:'Fat%',
  visceral:'Visceral Fat', workout:'Workout Done', meditation:'Meditation Done',
  food:'Food Plates Shared', water:'Water (L)', sleep:'Sleep (hrs)',
  energy:'Energy Level', notes:'Coach Notes'
};
const TARGETS = { workout:5, meditation:7, food:5, water:2.5, sleep:7 };

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function getVal(obj, colName) {
  if (!obj) return '';
  const k = Object.keys(obj).find(x => x.trim().toLowerCase() === colName.trim().toLowerCase());
  return k !== undefined ? obj[k] : '';
}
function nv(v, f=0) {
  const n = parseFloat(v);
  return isNaN(n) ? f : n;
}
function setLoadingText(t) {
  const el = document.getElementById('loadingText');
  if (el) el.textContent = t;
}
function showLoading(txt='Loading…') {
  setLoadingText(txt);
  document.getElementById('loadingScreen').style.display = 'flex';
}
function hideLoading() {
  document.getElementById('loadingScreen').style.display = 'none';
}

// ═══════════════════════════════════════════════════════
// AUTH — LOGIN
// ═══════════════════════════════════════════════════════
async function doLogin() {
  const pw = document.getElementById('pwInput').value.trim();
  if (!pw) { document.getElementById('loginErr').textContent = 'Please enter the password.'; return; }
  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Checking…'; btn.disabled = true;
  document.getElementById('loginErr').textContent = '';
  try {
    const res  = await fetch(API_URL + '?action=auth&password=' + encodeURIComponent(pw));
    const data = await res.json();
    if (data.success && data.token) {
      SESSION_TOKEN = data.token;
      document.getElementById('loginWrap').style.display = 'none';
      startCoachMode();
    } else {
      document.getElementById('loginErr').textContent = data.error || 'Incorrect password. Try again.';
      btn.textContent = 'Sign In'; btn.disabled = false;
    }
  } catch(e) {
    document.getElementById('loginErr').textContent = 'Could not reach server. Check connection.';
    btn.textContent = 'Sign In'; btn.disabled = false;
  }
}
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });

// ═══════════════════════════════════════════════════════
// LOGOUT
// ═══════════════════════════════════════════════════════
function doLogout() {
  SESSION_TOKEN = null;
  CLIENT_TOKEN  = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('pwInput').value = '';
  document.getElementById('loginErr').textContent = '';
  document.getElementById('clientSelect').innerHTML = '<option value="">— Select client —</option>';
  document.getElementById('content').innerHTML = '';
}

// ═══════════════════════════════════════════════════════
// COACH MODE — after login
// ═══════════════════════════════════════════════════════
function startCoachMode() {
  document.getElementById('app').style.display = 'block';
  document.getElementById('coachTitle').innerHTML = '<span style="color:var(--text)">Paresh</span><span style="color:var(--green)"> & Sampada</span>';
  document.getElementById('clientSelectorWrap').style.display = '';
  document.getElementById('syncBtn').style.display = '';
  document.getElementById('logoutBtn').style.display = '';
  document.getElementById('navSettings').style.display = '';
  fetchClients();
}

// ═══════════════════════════════════════════════════════
// CLIENT URL MODE — ?client=Name&ctoken=xxx
// ═══════════════════════════════════════════════════════
function startClientMode() {
  CLIENT_TOKEN = CTOKEN_PARAM;
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  // Hide coach-only UI
  document.getElementById('clientSelectorWrap').style.display = 'none';
  document.getElementById('syncBtn').style.display = 'none';
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('navSettings').style.display = 'none';
  // Set title: first word white, rest green
  setClientTitle(CLIENT_PARAM);
  fetchClientData(CLIENT_PARAM);
}
function setClientTitle(name) {
  if (!name) return;
  const parts = name.trim().split(' ');
  const first = parts[0];
  const rest  = parts.slice(1).join(' ');
  document.getElementById('coachTitle').innerHTML =
    '<span style="color:var(--text)">' + first + '</span>' +
    (rest ? '<span style="color:var(--green)"> ' + rest + '</span>' : '');
}

// ═══════════════════════════════════════════════════════
// FETCH CLIENTS LIST (coach mode)
// ═══════════════════════════════════════════════════════
let _clientTokenMap = {};  // name → client_token cache
async function fetchClients() {
  showLoading('Loading client list…');
  try {
    const res  = await fetch(API_URL + '?action=clients&token=' + encodeURIComponent(SESSION_TOKEN));
    const data = await res.json();
    hideLoading();
    if (!data.success) { showError(data.error || 'Failed to load clients.'); return; }
    _clientTokenMap = {};
    const sel = document.getElementById('clientSelect');
    sel.innerHTML = '<option value="">— Select client —</option>';
    (data.clients || []).forEach(c => {
      _clientTokenMap[c.name] = c.client_token;
      const opt = document.createElement('option');
      opt.value = c.name; opt.textContent = c.name;
      sel.appendChild(opt);
    });
  } catch(e) {
    hideLoading();
    showError('Could not connect to server. Click 🔄 Sync to retry.');
  }
}

// ═══════════════════════════════════════════════════════
// FETCH SINGLE CLIENT DATA
// ═══════════════════════════════════════════════════════
let _currentClient = null;
async function fetchClientData(name) {
  showLoading('Fetching client data…');
  try {
    const token = CLIENT_TOKEN || SESSION_TOKEN;
    const url   = API_URL + '?action=client&name=' + encodeURIComponent(name) + '&token=' + encodeURIComponent(token);
    const res   = await fetch(url);
    const data  = await res.json();
    hideLoading();
    if (!data.success) { showError(data.error || 'Failed to load client data.'); return; }
    _currentClient = name;
    renderDashboard(data.data || []);
  } catch(e) {
    hideLoading();
    showError('Could not fetch client data. Check your connection.');
  }
}

function onClientChange() {
  const name = document.getElementById('clientSelect').value;
  if (!name) { document.getElementById('content').innerHTML = ''; return; }
  setClientTitle(name);
  fetchClientData(name);
}

function doSync() {
  if (CLIENT_PARAM) {
    fetchClientData(CLIENT_PARAM);
  } else {
    _currentClient = null;
    fetchClients();
  }
}

// ═══════════════════════════════════════════════════════
// SETTINGS PANEL — SHARE LINKS
// ═══════════════════════════════════════════════════════
function toggleSettings() {
  const p = document.getElementById('settingsPanel');
  const isOpen = p.classList.toggle('open');
  if (isOpen) loadClientLinks();
}
async function loadClientLinks() {
  const list = document.getElementById('clientLinksList');
  list.innerHTML = '<div style="color:var(--muted);font-size:13px">Loading…</div>';
  try {
    const res  = await fetch(API_URL + '?action=clients&token=' + encodeURIComponent(SESSION_TOKEN));
    const data = await res.json();
    if (!data.success || !(data.clients||[]).length) {
      list.innerHTML = '<div style="color:var(--muted);font-size:13px">No clients found.</div>'; return;
    }
    const base = window.location.origin + window.location.pathname;
    list.innerHTML = '';
    data.clients.forEach((c, i) => {
      const url = base + '?client=' + encodeURIComponent(c.name) + '&ctoken=' + encodeURIComponent(c.client_token);
      window['_clurl_'+i] = url;
      const row = document.createElement('div');
      row.className = 'client-link-row';
      row.innerHTML = '<span class="client-link-name">' + c.name + '</span>' +
        '<button class="copy-btn" onclick="copyLink(this,' + i + ')">📋 Copy</button>';
      list.appendChild(row);
    });
  } catch(e) {
    list.innerHTML = '<div style="color:var(--orange);font-size:12px">Error loading clients.</div>';
  }
}
function copyLink(btn, i) {
  const url = window['_clurl_'+i];
  navigator.clipboard.writeText(url).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => { btn.innerHTML = orig; }, 2000);
  });
}

// ═══════════════════════════════════════════════════════
// ERROR DISPLAY
// ═══════════════════════════════════════════════════════
function showError(msg) {
  document.getElementById('content').innerHTML =
    '<div class="error-banner">⚠️ ' + msg + '</div>' +
    '<div class="empty-state"><div class="big">⚠️</div><p>' + msg + '</p></div>';
}

// ═══════════════════════════════════════════════════════
// SECTION NAV
// ═══════════════════════════════════════════════════════
function showSection(sec, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

// ═══════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════
function renderDashboard(rows) {
  if (!rows || rows.length === 0) {
    document.getElementById('content').innerHTML =
      '<div class="empty-state"><div class="big">📋</div><p>No data found for this client.</p></div>';
    return;
  }
  // Sort by date ascending
  rows.sort((a,b) => {
    const pa = (getVal(a,COL.date)||'').split('/').reverse().join('');
    const pb = (getVal(b,COL.date)||'').split('/').reverse().join('');
    return pa.localeCompare(pb);
  });

  const html = [
    renderOverview(rows),
    renderRings(rows),
    renderBodyCharts(rows),
    renderHabitChart(rows),
    renderStreaks(rows),
    renderNotes(rows),
    renderHistory(rows, 1)
  ].join('');
  document.getElementById('content').innerHTML = html + '<footer>#getfitwithpareshsampada</footer>';
  window._vcRows = rows;
  drawCharts(rows);
  updateStreaks(rows);
}

// ═══════════════════════════════════════════════════════
// OVERVIEW STATS
// ═══════════════════════════════════════════════════════
function renderOverview(rows) {
  const rowsW = rows.filter(r => getVal(r,COL.weight)!=='' && getVal(r,COL.weight)!==undefined);
  const rowsF = rows.filter(r => getVal(r,COL.fat)!=='' && getVal(r,COL.fat)!==undefined);
  const rowsV = rows.filter(r => getVal(r,COL.visceral)!=='' && getVal(r,COL.visceral)!==undefined);

  const firstW = rowsW[0], lastW = rowsW[rowsW.length-1];
  const firstF = rowsF[0], lastF = rowsF[rowsF.length-1];
  const firstV = rowsV[0], lastV = rowsV[rowsV.length-1];
  const first  = rows[0];

  const startDate = getVal(first, COL.date) || '—';
  const wLost  = firstW && lastW ? (nv(getVal(firstW,COL.weight)) - nv(getVal(lastW,COL.weight))).toFixed(1) : '—';
  const fDrop  = firstF && lastF ? (nv(getVal(firstF,COL.fat))    - nv(getVal(lastF,COL.fat))).toFixed(1)    : '—';
  const vDrop  = firstV && lastV ? (nv(getVal(firstV,COL.visceral))- nv(getVal(lastV,COL.visceral))).toFixed(1): '—';
  const startW = firstW ? nv(getVal(firstW,COL.weight)).toFixed(1) : '—';
  const curW   = lastW  ? nv(getVal(lastW, COL.weight)).toFixed(1) : '—';
  const leanGain = firstF && lastF && firstW && lastW ?
    ((nv(getVal(lastW,COL.weight))*(1-nv(getVal(lastF,COL.fat))/100)) -
     (nv(getVal(firstW,COL.weight))*(1-nv(getVal(firstF,COL.fat))/100))).toFixed(1) : '—';

  const glow = (c,v) => `<span style="font-weight:800;color:${c};text-shadow:0 0 16px ${c}88">${v}</span>`;

  const cards = [
    {l:'Start Date',        v:glow('var(--green)',startDate),  c:'var(--green)'},
    {l:'Starting Weight',   v:glow('var(--orange)',startW+' kg') + '<div style="font-size:15px;font-weight:800;color:var(--orange);text-shadow:0 0 16px #ff704388;margin-top:2px">Now: '+curW+' kg</div>', c:'var(--orange)', raw:true},
    {l:'Weight Lost',       v:glow('var(--orange)', (parseFloat(wLost)>0?'-':'')+wLost+' kg'), c:'var(--orange)'},
    {l:'Fat% Reduced',      v:glow('var(--blue)',   (parseFloat(fDrop)>0?'-':'')+fDrop+'%'),   c:'var(--blue)'},
    {l:'Visceral Drop',     v:glow('var(--purple)',  (parseFloat(vDrop)>0?'-':'')+vDrop),       c:'var(--purple)'},
    {l:'Lean Mass Change',  v:glow('var(--teal)',   (parseFloat(leanGain)>=0?'+':'')+leanGain+' kg'), c:'var(--teal)'},
  ];

  return '<div class="section-title">📊 Overview</div><div class="stats-grid">' +
    cards.map(c => `<div class="stat-card" style="border-color:${c.c}22">
      <div class="stat-label">${c.l}</div>
      <div class="stat-value">${c.v}</div>
    </div>`).join('') + '</div>';
}

// ═══════════════════════════════════════════════════════
// HABIT RINGS
// ═══════════════════════════════════════════════════════
function renderRings(rows) {
  const last = rows[rows.length-1];
  const _r = (col) => {
    const v = getVal(last, col);
    return (v !== undefined && v !== null && String(v).trim() !== '') ? nv(v) : null;
  };

  const workout   = _r(COL.workout);
  const meditation= _r(COL.meditation);
  const food      = _r(COL.food);
  const water     = _r(COL.water);
  const sleep     = _r(COL.sleep);
  const energy    = _r(COL.energy);

  const rings = [
    { icon:'💪', label:'Workout',    pct: workout!==null ? Math.min(100,(workout/7)*100) : null,
      disp: workout!==null ? workout+'/7' : '—', color:'var(--green)', sub:'sessions this week' },
    { icon:'🧘', label:'Meditation', pct: meditation!==null ? Math.min(100,(meditation/7)*100) : null,
      disp: meditation!==null ? meditation+'/7' : '—', color:'var(--purple)', sub:'days this week' },
    { icon:'🍽️', label:'Food Plates',pct: food!==null ? Math.min(100,(food/14)*100) : null,
      disp: food!==null ? food+'/14' : '—', color:'var(--orange)', sub:'plates shared' },
    { icon:'💧', label:'Water',      pct: water!==null ? Math.min(100,(water/2.5)*100) : null,
      disp: water!==null ? water+'L' : '—', color:'var(--blue)', sub:'target 2.5L' },
    { icon:'😴', label:'Sleep',      pct: sleep!==null ? Math.min(100,(sleep/7)*100) : null,
      disp: sleep!==null ? sleep+'h' : '—', color:'var(--teal)', sub:'target 7h' },
    { icon:'⚡', label:'Energy',     pct: energy!==null ? energy*10 : null,
      disp: energy!==null ? energy+'/10' : '—', color:'var(--yellow)', sub:'energy level' },
  ];

  const ring = (r) => {
    const pct = r.pct !== null ? r.pct : 0;
    const circ = 2*Math.PI*34;
    const dash = (pct/100)*circ;
    const color = r.pct !== null ? r.color : 'var(--muted)';
    return `<div class="ring-card">
      <div class="ring-wrap">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="34" fill="none" stroke="var(--border)" stroke-width="7"/>
          <circle cx="40" cy="40" r="34" fill="none" stroke="${color}" stroke-width="7"
            stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}"
            stroke-linecap="round" style="transition:stroke-dasharray .8s ease"/>
        </svg>
        <div class="ring-val" style="color:${color}">${r.icon}</div>
      </div>
      <div class="ring-label">${r.label}</div>
      <div class="ring-sub">${r.disp}</div>
    </div>`;
  };

  return '<div class="section-title">🎯 This Week\'s Habit Compliance</div><div class="rings-grid">' +
    rings.map(ring).join('') + '</div>';
}

// ═══════════════════════════════════════════════════════
// BODY COMPOSITION CHARTS
// ═══════════════════════════════════════════════════════
function renderBodyCharts(rows) {
  return `<div class="section-title">📈 Body Composition</div>
  <div class="charts-grid">
    <div class="chart-card"><div class="chart-title">⚖️ Weight Progression</div><div class="chart-sub">kg over time</div><canvas id="chartWeight" height="180"></canvas></div>
    <div class="chart-card"><div class="chart-title">🔵 Body Fat %</div><div class="chart-sub">% over time</div><canvas id="chartFat" height="180"></canvas></div>
    <div class="chart-card"><div class="chart-title">🟣 Visceral Fat</div><div class="chart-sub">Scale 1–9 • Optimum: below 7</div><canvas id="chartVisceral" height="180"></canvas></div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// WEEKLY HABIT CHART
// ═══════════════════════════════════════════════════════
function renderHabitChart(rows) {
  return `<div class="section-title">📅 Weekly Habit Trends</div>
  <div class="chart-card" style="margin-bottom:28px">
    <canvas id="chartHabits" height="200"></canvas>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// STREAKS
// ═══════════════════════════════════════════════════════
function renderStreaks(rows) {
  const today = new Date();
  const d4wAgo = new Date(today); d4wAgo.setDate(d4wAgo.getDate()-28);
  const fmt = d => d.toISOString().split('T')[0];

  return `<div class="section-title">🔥 Streaks & Achievements</div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:28px">
    <div class="streak-controls">
      <label>From</label>
      <input type="date" id="streakFrom" value="${fmt(d4wAgo)}" onchange="updateStreaks()">
      <label>To</label>
      <input type="date" id="streakTo" value="${fmt(today)}" onchange="updateStreaks()">
    </div>
    <div id="streakBadges" class="badge-row"></div>
    <div id="streakWeeks"></div>
  </div>`;
}

function updateStreaks(rows) {
  rows = rows || window._vcRows;
  if (!rows) return;
  const from = new Date(document.getElementById('streakFrom').value);
  const to   = new Date(document.getElementById('streakTo').value);
  to.setHours(23,59,59);

  // Group by week (Mon–Sun)
  const weeks = {};
  rows.forEach(r => {
    const dStr = getVal(r, COL.date);
    if (!dStr) return;
    const parts = dStr.split('/');
    if (parts.length < 3) return;
    const d = new Date(parts[2], parts[1]-1, parts[0]);
    if (d < from || d > to) return;
    // Monday of that week
    const mon = new Date(d);
    mon.setDate(d.getDate() - ((d.getDay()+6)%7));
    const key = mon.toISOString().split('T')[0];
    if (!weeks[key]) weeks[key] = { workout:0, meditation:0, food:0 };
    weeks[key].workout    = Math.max(weeks[key].workout,    nv(getVal(r,COL.workout)));
    weeks[key].meditation = Math.max(weeks[key].meditation, nv(getVal(r,COL.meditation)));
    weeks[key].food       = Math.max(weeks[key].food,       nv(getVal(r,COL.food)));
  });

  const keys = Object.keys(weeks).sort();
  let streak = 0, maxStreak = 0, curStreak = 0;
  const weekResults = keys.map(k => {
    const w = weeks[k];
    const pass = w.workout>=4 && w.meditation>=3 && w.food>=10;
    return { key:k, ...w, pass };
  });
  weekResults.forEach(w => { if(w.pass) curStreak++; else curStreak=0; maxStreak=Math.max(maxStreak,curStreak); });
  // count from end
  let streakFromEnd = 0;
  for(let i=weekResults.length-1;i>=0;i--){ if(weekResults[i].pass) streakFromEnd++; else break; }

  const badges = [];
  if (streakFromEnd >= 1) badges.push('🔥 On a streak!');
  if (maxStreak >= 4)     badges.push('🏆 4-Week Champion');
  if (maxStreak >= 2)     badges.push('⭐ 2-Week Warrior');
  if (weekResults.filter(w=>w.pass).length >= keys.length && keys.length > 0) badges.push('💪 Perfect Run');

  document.getElementById('streakBadges').innerHTML = badges.length ?
    badges.map(b=>`<span class="badge">${b}</span>`).join('') :
    '<span style="color:var(--muted);font-size:13px">Keep going — badges unlock at 2+ streak weeks!</span>';

  document.getElementById('streakWeeks').innerHTML = weekResults.map(w => {
    const sun = new Date(w.key); sun.setDate(sun.getDate()+6);
    const label = w.key.split('-').slice(1).join('/') + ' – ' + String(sun.getDate()).padStart(2,'0')+'/'+String(sun.getMonth()+1).padStart(2,'0');
    const color = w.pass ? 'var(--green)' : 'var(--orange)';
    return `<div class="week-streak-row">
      <span class="streak-week-label">${label}</span>
      <div class="streak-dot" style="background:${color}"></div>
      <span style="font-size:12px;color:${color}">${w.pass?'✅ Week Complete':'Incomplete'}</span>
      <span style="font-size:11px;color:var(--muted);margin-left:auto">W:${w.workout} M:${w.meditation} F:${w.food}</span>
    </div>`;
  }).join('') || '<div style="color:var(--muted);font-size:13px;padding:10px 0">No data in range.</div>';
}

// ═══════════════════════════════════════════════════════
// COACH NOTES
// ═══════════════════════════════════════════════════════
function renderNotes(rows) {
  const notes = rows.filter(r => {
    const n = getVal(r, COL.notes);
    return n && String(n).trim() !== '';
  }).reverse().slice(0,10);
  if (!notes.length) return '<div class="section-title">📝 Coach Notes</div><div class="empty-state" style="padding:20px"><p>No notes yet.</p></div>';
  return '<div class="section-title">📝 Coach Notes</div>' +
    notes.map(r => `<div class="note-item">
      <div class="note-date">${getVal(r,COL.date)}</div>
      <div class="note-text">${getVal(r,COL.notes)}</div>
    </div>`).join('') + '<div style="margin-bottom:28px"></div>';
}

// ═══════════════════════════════════════════════════════
// HISTORY TABLE
// ═══════════════════════════════════════════════════════
const PAGE_SIZE = 10;
function renderHistory(rows, page) {
  const total = rows.length;
  const pages = Math.ceil(total/PAGE_SIZE);
  const start = (page-1)*PAGE_SIZE;
  const slice = rows.slice().reverse().slice(start, start+PAGE_SIZE);

  const hColor = {
    'Date':'var(--green)', 'Wt Δ':'var(--orange)', 'Weight':'var(--orange)',
    'Fat%':'var(--blue)', 'Visceral':'var(--purple)',
    'Workout':'var(--blue)', 'Meditation':'var(--purple)',
    'Food Plates':'var(--green)', 'Water':'var(--blue)',
    'Sleep':'var(--purple)', 'Energy':'var(--yellow)'
  };
  const cols = ['Date','Wt Δ','Weight','Fat%','Visceral','Workout','Meditation','Food Plates','Water','Sleep','Energy'];

  const thead = '<tr>' + cols.map(c => `<th style="color:${hColor[c]||'var(--muted)'}">${c}</th>`).join('') + '</tr>';
  const tbody = slice.map((r, i) => {
    const allRows = rows.slice().reverse();
    const globalIdx = start + i;
    const prevRow = allRows[globalIdx+1];
    const curW  = nv(getVal(r, COL.weight), null);
    const prevW = prevRow ? nv(getVal(prevRow, COL.weight), null) : null;
    const wDelta = (curW !== null && prevW !== null) ? (curW - prevW).toFixed(1) : '—';
    const wDeltaColor = parseFloat(wDelta) < 0 ? 'var(--green)' : parseFloat(wDelta) > 0 ? 'var(--orange)' : 'var(--muted)';
    return '<tr>' +
      `<td>${getVal(r,COL.date)||'—'}</td>` +
      `<td style="color:${wDeltaColor}">${wDelta !== '—' ? (parseFloat(wDelta)>0?'+':'')+wDelta : '—'}</td>` +
      `<td>${getVal(r,COL.weight)||'—'}</td>` +
      `<td>${getVal(r,COL.fat)||'—'}</td>` +
      `<td>${getVal(r,COL.visceral)||'—'}</td>` +
      `<td>${getVal(r,COL.workout)||'—'}</td>` +
      `<td>${getVal(r,COL.meditation)||'—'}</td>` +
      `<td>${getVal(r,COL.food)||'—'}</td>` +
      `<td>${getVal(r,COL.water)||'—'}</td>` +
      `<td>${getVal(r,COL.sleep)||'—'}</td>` +
      `<td>${getVal(r,COL.energy)||'—'}</td>` +
    '</tr>';
  }).join('');

  const pageButtons = Array.from({length:pages},(_,i) =>
    `<button class="page-btn${i+1===page?' active':''}" onclick="goPage(${i+1})">${i+1}</button>`
  ).join('');

  return `<div class="section-title">📋 Complete Measurement History</div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:28px">
    <div class="history-table-wrap">
      <table><thead>${thead}</thead><tbody>${tbody}</tbody></table>
    </div>
    <div class="pagination">
      <button class="page-btn" onclick="goPage(${Math.max(1,page-1)})" ${page===1?'disabled':''}>← Prev</button>
      ${pageButtons}
      <button class="page-btn" onclick="goPage(${Math.min(pages,page+1)})" ${page===pages?'disabled':''}>Next →</button>
    </div>
  </div>`;
}

function goPage(p) {
  const rows = window._vcRows;
  if (!rows) return;
  const saved = {
    from: document.getElementById('streakFrom') ? document.getElementById('streakFrom').value : null,
    to:   document.getElementById('streakTo')   ? document.getElementById('streakTo').value   : null
  };
  const html = [
    renderOverview(rows),
    renderRings(rows),
    renderBodyCharts(rows),
    renderHabitChart(rows),
    renderStreaks(rows),
    renderNotes(rows),
    renderHistory(rows, p)
  ].join('');
  document.getElementById('content').innerHTML = html + '<footer>#getfitwithpareshsampada</footer>';
  drawCharts(rows);
  if (saved.from) document.getElementById('streakFrom').value = saved.from;
  if (saved.to)   document.getElementById('streakTo').value   = saved.to;
  updateStreaks(rows);
}

// ═══════════════════════════════════════════════════════
// CHART.JS DRAWING
// ═══════════════════════════════════════════════════════
const _charts = {};
function destroyChart(id) { if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; } }

function drawCharts(rows) {
  const labels = rows.map(r => getVal(r, COL.date));

  // Weight
  destroyChart('chartWeight');
  const wCtx = document.getElementById('chartWeight');
  if (wCtx) _charts['chartWeight'] = new Chart(wCtx.getContext('2d'), {
    type:'line',
    data:{
      labels,
      datasets:[{label:'Weight (kg)',data:rows.map(r=>nv(getVal(r,COL.weight),null)),
        borderColor:'var(--orange)',backgroundColor:'#ff704322',fill:true,tension:.3,pointRadius:3,
        spanGaps:true}]
    },
    options:{responsive:true,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'var(--muted)',maxTicksLimit:6},grid:{color:'var(--border)'}},
              y:{ticks:{color:'var(--muted)'},grid:{color:'var(--border)'}}}}
  });

  // Fat
  destroyChart('chartFat');
  const fCtx = document.getElementById('chartFat');
  if (fCtx) _charts['chartFat'] = new Chart(fCtx.getContext('2d'), {
    type:'line',
    data:{
      labels,
      datasets:[{label:'Fat%',data:rows.map(r=>nv(getVal(r,COL.fat),null)),
        borderColor:'var(--blue)',backgroundColor:'#4d9fff22',fill:true,tension:.3,pointRadius:3,
        spanGaps:true}]
    },
    options:{responsive:true,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'var(--muted)',maxTicksLimit:6},grid:{color:'var(--border)'}},
              y:{ticks:{color:'var(--muted)'},grid:{color:'var(--border)'}}}}
  });

  // Visceral
  destroyChart('chartVisceral');
  const vCtx = document.getElementById('chartVisceral');
  if (vCtx) _charts['chartVisceral'] = new Chart(vCtx.getContext('2d'), {
    type:'line',
    data:{
      labels,
      datasets:[{label:'Visceral Fat',data:rows.map(r=>nv(getVal(r,COL.visceral),null)),
        borderColor:'var(--purple)',backgroundColor:'#b06cff22',fill:true,tension:.3,pointRadius:3,
        spanGaps:true}]
    },
    options:{responsive:true,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'var(--muted)',maxTicksLimit:6},grid:{color:'var(--border)'}},
              y:{ticks:{color:'var(--muted)'},grid:{color:'var(--border)'},min:1,max:9,
                suggestedMin:1}}}
  });

  // Weekly habit bar chart — group by week
  destroyChart('chartHabits');
  const hCtx = document.getElementById('chartHabits');
  if (hCtx) {
    // Build weekly aggregation
    const weeklyMap = {};
    rows.forEach(r => {
      const dStr = getVal(r, COL.date);
      if (!dStr) return;
      const parts = dStr.split('/');
      if (parts.length < 3) return;
      const d = new Date(parts[2], parts[1]-1, parts[0]);
      const mon = new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7));
      const key = mon.toISOString().split('T')[0];
      if (!weeklyMap[key]) weeklyMap[key] = { workout:0, meditation:0, food:0, water:0, sleep:0 };
      const w = weeklyMap[key];
      w.workout    = Math.max(w.workout,    nv(getVal(r,COL.workout)));
      w.meditation = Math.max(w.meditation, nv(getVal(r,COL.meditation)));
      w.food       = Math.max(w.food,       nv(getVal(r,COL.food)));
      w.water      = Math.max(w.water,      nv(getVal(r,COL.water)));
      w.sleep      = Math.max(w.sleep,      nv(getVal(r,COL.sleep)));
    });
    const wks = Object.keys(weeklyMap).sort().slice(-8);
    const wLabels = wks.map(k => k.split('-').slice(1).join('/'));
    _charts['chartHabits'] = new Chart(hCtx.getContext('2d'), {
      type:'bar',
      data:{
        labels:wLabels,
        datasets:[
          {label:'Workout',    data:wks.map(k=>weeklyMap[k].workout),    backgroundColor:'#00e5a0aa'},
          {label:'Meditation', data:wks.map(k=>weeklyMap[k].meditation), backgroundColor:'#b06cffaa'},
          {label:'Food Plates',data:wks.map(k=>weeklyMap[k].food),       backgroundColor:'#ff7043aa'},
        ]
      },
      options:{responsive:true,plugins:{legend:{labels:{color:'var(--text)'}}},
        scales:{x:{ticks:{color:'var(--muted)'},grid:{color:'var(--border)'}},
                y:{ticks:{color:'var(--muted)'},grid:{color:'var(--border)'}}}}
    });
  }

  // Run streaks after charts
}

  if (CLIENT_PARAM && CTOKEN_PARAM) {

    startClientMode();

  // else: coach login screen shown by default
}
initApp();
