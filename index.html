<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitalCoach — Client Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0f14;
  --surface: #151820;
  --surface2: #1c2030;
  --border: #252a3a;
  --green: #00e5a0;
  --green-dim: rgba(0,229,160,0.12);
  --orange: #ff7043;
  --orange-dim: rgba(255,112,67,0.12);
  --blue: #4d9fff;
  --blue-dim: rgba(77,159,255,0.12);
  --purple: #b06cff;
  --purple-dim: rgba(176,108,255,0.12);
  --text: #e8eaf2;
  --muted: #6b7394;
  --card-r: 16px;
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
/* SIDEBAR */
.sidebar {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 72px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 0;
  z-index: 50;
  gap: 8px;
}
.logo-mark {
  width: 40px; height: 40px;
  background: var(--green);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 16px;
  color: #0d0f14;
}
.nav-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--muted);
  font-size: 18px;
  transition: all 0.2s;
}
.nav-icon:hover { background: var(--surface2); color: var(--text); }
.nav-icon.active { background: var(--green-dim); color: var(--green); }
/* MAIN */
.main { margin-left: 72px; min-height: 100vh; display: flex; flex-direction: column; }
/* TOPBAR */
.topbar {
  height: 68px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 16px;
  position: sticky; top: 0; z-index: 40;
}
.topbar-title {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
  flex: 1;
}
.topbar-title span { color: var(--green); }
.client-selector-wrap { position: relative; }
.client-selector-wrap::before {
  content: '👤';
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  pointer-events: none;
}
select#clientSelect {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 40px 9px 38px;
  border-radius: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  min-width: 220px;
  transition: border-color 0.2s;
}
select#clientSelect:focus { border-color: var(--green); }
.selector-arrow {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 11px;
  pointer-events: none;
}
.sync-btn {
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid rgba(0,229,160,0.2);
  padding: 8px 16px;
  border-radius: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sync-btn:hover { background: rgba(0,229,160,0.2); }
.sync-btn.loading { opacity: 0.6; pointer-events: none; }
/* CONTENT */
.content { padding: 28px; flex: 1; }
/* STAT CARDS */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--card-r);
  padding: 20px 22px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
}
.stat-card:hover { transform: translateY(-2px); border-color: #353a50; }
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: var(--card-r) var(--card-r) 0 0;
}
.stat-card.green::before { background: var(--green); }
.stat-card.orange::before { background: var(--orange); }
.stat-card.blue::before { background: var(--blue); }
.stat-card.purple::before { background: var(--purple); }
.stat-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  margin-bottom: 14px;
}
.stat-card.green .stat-icon { background: var(--green-dim); }
.stat-card.orange .stat-icon { background: var(--orange-dim); }
.stat-card.blue .stat-icon { background: var(--blue-dim); }
.stat-card.purple .stat-icon { background: var(--purple-dim); }
.stat-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 500;
  margin-bottom: 6px;
}
.stat-value {
  font-family: 'Syne', sans-serif;
  font-size: 26px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 6px;
}
.stat-card.green .stat-value { color: var(--green); }
.stat-card.orange .stat-value { color: var(--orange); }
.stat-card.blue .stat-value { color: var(--blue); }
.stat-card.purple .stat-value { color: var(--purple); }
.stat-sub { font-size: 12px; color: var(--muted); }
.stat-delta {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 12px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
}
.delta-good { background: var(--green-dim); color: var(--green); }
.delta-warn { background: var(--orange-dim); color: var(--orange); }
/* CHARTS */
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--card-r);
  padding: 22px;
}
.chart-card.full-width { grid-column: 1 / -1; }
.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.chart-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }
.chart-subtitle { font-size: 12px; color: var(--muted); margin-top: 3px; }
.chart-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
}
.chart-badge.green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,229,160,0.2); }
.chart-badge.orange { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(255,112,67,0.2); }
.chart-badge.blue { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(77,159,255,0.2); }
.chart-badge.purple { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(176,108,255,0.2); }
canvas { width: 100% !important; }
/* TABLE */
.table-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--card-r);
  overflow: hidden;
  margin-bottom: 24px;
}
.table-head {
  padding: 20px 22px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
table { width: 100%; border-collapse: collapse; }
th {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  font-weight: 500;
  padding: 12px 22px;
  text-align: left;
  background: var(--surface2);
}
td {
  padding: 13px 22px;
  font-size: 13px;
  border-top: 1px solid var(--border);
  vertical-align: middle;
}
tr:hover td { background: rgba(255,255,255,0.02); }
.trend-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 20px;
}
/* LOADING & STATES */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 40px;
  gap: 16px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--muted); }
.error-box {
  background: rgba(255,112,67,0.08);
  border: 1px solid rgba(255,112,67,0.3);
  border-radius: var(--card-r);
  padding: 24px;
  text-align: center;
  color: var(--orange);
  font-size: 14px;
  line-height: 1.7;
}
.empty-state {
  text-align: center;
  padding: 80px 40px;
  color: var(--muted);
}
.empty-state .big { font-size: 48px; margin-bottom: 16px; }
/* LAST SYNC */
.last-sync {
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.sync-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
/* ANIMATIONS */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.anim { opacity: 0; animation: fadeIn 0.5s ease forwards; }
.anim-1 { animation-delay: 0.05s; }
.anim-2 { animation-delay: 0.1s; }
.anim-3 { animation-delay: 0.15s; }
.anim-4 { animation-delay: 0.2s; }
.anim-5 { animation-delay: 0.25s; }
/* RESPONSIVE */
@media (max-width: 900px) {
  .charts-grid { grid-template-columns: 1fr; }
  .charts-grid .chart-card.full-width { grid-column: 1; }
}
@media (max-width: 640px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .content { padding: 16px; }
  .stats-row { grid-template-columns: 1fr 1fr; }
  .topbar { padding: 0 16px; gap: 10px; }
  select#clientSelect { min-width: 160px; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="logo-mark">VC</div>
  <div class="nav-icon active" title="Dashboard">📊</div>
  <div class="nav-icon" title="Clients">👥</div>
  <div class="nav-icon" title="Programs">🎯</div>
  <div class="nav-icon" title="Nutrition">🥗</div>
  <div class="nav-icon" title="Reports">📋</div>
  <div style="flex:1"></div>
  <div class="nav-icon" title="Settings">⚙️</div>
</nav>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-title">Vital<span>Coach</span></div>

    <div id="lastSync" class="last-sync" style="display:none">
      <div class="sync-dot"></div>
      <span id="syncTime">Synced just now</span>
    </div>

    <div class="client-selector-wrap">
      <select id="clientSelect" onchange="loadClient(this.value)" disabled>
        <option value="">Loading clients...</option>
      </select>
      <span class="selector-arrow">▼</span>
    </div>

    <button class="sync-btn" onclick="fetchSheetData(true)" id="syncBtn">
      🔄 Refresh Data
    </button>
  </header>

  <!-- CONTENT -->
  <main class="content" id="content">
    <div class="loading-screen">
      <div class="spinner"></div>
      <div class="loading-text">Connecting to your Google Sheet...</div>
    </div>
  </main>

</div>

<script>
// ─────────────────────────────────────────
// YOUR GOOGLE SHEET CSV URL
// ─────────────────────────────────────────
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS40s3zJuAlHMNoXQInf0tS8v2-EEurHHbtaTTpkTPTTxeJCyyX531c-ZOYjvlVzFFGUfEwKh2DzaBf/pub?gid=438947235&single=true&output=csv';

// ─────────────────────────────────────────
// COLUMN MAPPING — matches your Sheet Row 1
// Change these if your column names differ
// ─────────────────────────────────────────
const COLS = {
  clientName:   'Client Name',
  date:         'Date',
  weight:       'Weight',
  fat:          'Fat%',
  visceralFat:  'Visceral Fat'
};

let allData = {};
let charts  = {};

// ─────────────────────────────────────────
// PARSE CSV
// ─────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = lines[i].match(/(".*?"|[^,]+)(?=,|$)/g) || [];
    const row = {};
    headers.forEach((h, idx) => {
      row[h] = (vals[idx] || '').replace(/^"|"$/g, '').trim();
    });
    rows.push(row);
  }
  return rows;
}

// ─────────────────────────────────────────
// GROUP BY CLIENT
// ─────────────────────────────────────────
function groupByClient(rows) {
  const clients = {};
  rows.forEach(row => {
    const name = row[COLS.clientName];
    if (!name) return;
    if (!clients[name]) clients[name] = [];
    clients[name].push({
      date:        row[COLS.date],
      weight:      parseFloat(row[COLS.weight]) || 0,
      fat:         parseFloat(row[COLS.fat])    || 0,
      visceral:    parseFloat(row[COLS.visceralFat]) || 0,
      rawDate:     parseDate(row[COLS.date])
    });
  });
  // Sort each client's records by date ascending
  Object.keys(clients).forEach(name => {
    clients[name].sort((a, b) => a.rawDate - b.rawDate);
  });
  return clients;
}

// ─────────────────────────────────────────
// PARSE DATE — handles DD/MM/YYYY
// ─────────────────────────────────────────
function parseDate(str) {
  if (!str) return new Date();
  // Try DD/MM/YYYY first
  const parts = str.split('/');
  if (parts.length === 3) {
    return new Date(`${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`);
  }
  return new Date(str);
}

function fmtDate(str) {
  const d = parseDate(str);
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: '2-digit' });
}

// ─────────────────────────────────────────
// FETCH DATA FROM GOOGLE SHEET
// ─────────────────────────────────────────
async function fetchSheetData(isRefresh = false) {
  const syncBtn = document.getElementById('syncBtn');
  syncBtn.classList.add('loading');
  syncBtn.textContent = '⏳ Syncing...';

  if (!isRefresh) {
    document.getElementById('content').innerHTML = `
      <div class="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Connecting to your Google Sheet...</div>
      </div>`;
  }

  try {
    // Add cache-busting timestamp so we always get fresh data
    const url = `${SHEET_CSV_URL}&t=${Date.now()}`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const rows = parseCSV(text);

    if (rows.length === 0) throw new Error('No data found in sheet');

    allData = groupByClient(rows);

    // Populate client dropdown
    const sel = document.getElementById('clientSelect');
    const currentVal = sel.value;
    sel.innerHTML = '<option value="">— Select Client —</option>';
    Object.keys(allData).sort().forEach(name => {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      sel.appendChild(opt);
    });
    sel.disabled = false;

    // Show last sync time
    const lastSync = document.getElementById('lastSync');
    lastSync.style.display = 'flex';
    document.getElementById('syncTime').textContent = `Synced ${new Date().toLocaleTimeString()}`;

    // If a client was selected, reload their view
    if (currentVal && allData[currentVal]) {
      sel.value = currentVal;
      loadClient(currentVal);
    } else if (!isRefresh) {
      // Show empty state on first load
      document.getElementById('content').innerHTML = `
        <div class="empty-state">
          <div class="big">✅</div>
          <p><strong style="color:var(--text);font-size:18px;">Google Sheet connected successfully!</strong><br><br>
          ${Object.keys(allData).length} client(s) loaded.<br>Select a client from the dropdown above to view their dashboard.</p>
        </div>`;
    }

  } catch (err) {
    console.error(err);
    document.getElementById('content').innerHTML = `
      <div class="error-box">
        <div style="font-size:32px;margin-bottom:12px">⚠️</div>
        <strong>Could not load Google Sheet data</strong><br><br>
        Please make sure your Sheet is published as CSV.<br>
        <small style="opacity:0.7">File → Share → Publish to web → CSV → Publish</small><br><br>
        <small>${err.message}</small>
      </div>`;
  } finally {
    syncBtn.classList.remove('loading');
    syncBtn.textContent = '🔄 Refresh Data';
  }
}

// ─────────────────────────────────────────
// DESTROY OLD CHARTS
// ─────────────────────────────────────────
function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};
}

// ─────────────────────────────────────────
// LOAD CLIENT DASHBOARD
// ─────────────────────────────────────────
function loadClient(name) {
  destroyCharts();
  const content = document.getElementById('content');

  if (!name || !allData[name]) {
    content.innerHTML = `
      <div class="empty-state">
        <div class="big">📈</div>
        <p><strong style="color:var(--text);font-size:18px;">Select a client to view their dashboard</strong><br><br>
        Track weight, body fat %, visceral fat and more.</p>
      </div>`;
    return;
  }

  const r     = allData[name];
  const first = r[0];
  const last  = r[r.length - 1];
  const weightLost   = (first.weight   - last.weight).toFixed(1);
  const fatLost      = (first.fat      - last.fat).toFixed(1);
  const visceralDrop = (first.visceral - last.visceral).toFixed(1);
  const weeks = Math.max(1, Math.round((last.rawDate - first.rawDate) / (7*24*3600*1000)));
  const labels = r.map(x => fmtDate(x.date));

  // Determine trend direction
  const wGood = parseFloat(weightLost) >= 0;
  const fGood = parseFloat(fatLost) >= 0;
  const vGood = parseFloat(visceralDrop) >= 0;

  content.innerHTML = `
  <!-- STAT CARDS -->
  <div class="stats-row">
    <div class="stat-card green anim anim-1">
      <div class="stat-icon">📅</div>
      <div class="stat-label">Start Date</div>
      <div class="stat-value" style="font-size:17px">${fmtDate(first.date)}</div>
      <div class="stat-sub">${weeks} week${weeks!==1?'s':''} on programme</div>
    </div>
    <div class="stat-card orange anim anim-2">
      <div class="stat-icon">⚖️</div>
      <div class="stat-label">Starting Weight</div>
      <div class="stat-value">${first.weight}<span style="font-size:14px;font-weight:400"> kg</span></div>
      <div class="stat-sub">Current: <strong style="color:var(--text)">${last.weight} kg</strong></div>
    </div>
    <div class="stat-card green anim anim-3">
      <div class="stat-icon">📉</div>
      <div class="stat-label">Weight Lost</div>
      <div class="stat-value">${Math.abs(weightLost)}<span style="font-size:14px;font-weight:400"> kg</span></div>
      <div class="stat-sub">
        <span class="stat-delta ${wGood?'delta-good':'delta-warn'}">
          ${wGood?'↓':'↑'} ${Math.abs((weightLost/first.weight*100)).toFixed(1)}% of body weight
        </span>
      </div>
    </div>
    <div class="stat-card blue anim anim-4">
      <div class="stat-icon">🔥</div>
      <div class="stat-label">Fat % Reduced</div>
      <div class="stat-value">${Math.abs(fatLost)}<span style="font-size:14px;font-weight:400"> %</span></div>
      <div class="stat-sub">${first.fat}% → <strong style="color:var(--text)">${last.fat}%</strong></div>
    </div>
    <div class="stat-card purple anim anim-5">
      <div class="stat-icon">🧠</div>
      <div class="stat-label">Visceral Fat Drop</div>
      <div class="stat-value">${Math.abs(visceralDrop)}<span style="font-size:14px;font-weight:400"> pts</span></div>
      <div class="stat-sub">Level ${first.visceral} → <strong style="color:var(--text)">${last.visceral}</strong></div>
    </div>
    <div class="stat-card blue anim anim-1">
      <div class="stat-icon">📋</div>
      <div class="stat-label">Total Check-ins</div>
      <div class="stat-value">${r.length}</div>
      <div class="stat-sub">Last: ${fmtDate(last.date)}</div>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="charts-grid">
    <!-- Weight full width -->
    <div class="chart-card full-width anim anim-2">
      <div class="chart-header">
        <div>
          <div class="chart-title">Weight Progression</div>
          <div class="chart-subtitle">All sessions • kg</div>
        </div>
        <span class="chart-badge green">${wGood?'↓':'↑'} ${Math.abs(weightLost)} kg ${wGood?'lost':'gained'}</span>
      </div>
      <canvas id="weightChart" height="90"></canvas>
    </div>
    <!-- Fat % -->
    <div class="chart-card anim anim-3">
      <div class="chart-header">
        <div>
          <div class="chart-title">Body Fat %</div>
          <div class="chart-subtitle">Percentage body fat over time</div>
        </div>
        <span class="chart-badge orange">${fGood?'↓':'↑'} ${Math.abs(fatLost)}% ${fGood?'reduced':'increased'}</span>
      </div>
      <canvas id="fatChart" height="160"></canvas>
    </div>
    <!-- Visceral Fat -->
    <div class="chart-card anim anim-4">
      <div class="chart-header">
        <div>
          <div class="chart-title">Visceral Fat Level</div>
          <div class="chart-subtitle">Scale 1–30 · Healthy target: below 13</div>
        </div>
        <span class="chart-badge purple">${vGood?'↓':'↑'} ${Math.abs(visceralDrop)} level${Math.abs(visceralDrop)!==1?'s':''} ${vGood?'dropped':'increased'}</span>
      </div>
      <canvas id="visceralChart" height="160"></canvas>
    </div>
  </div>

  <!-- SESSION LOG TABLE -->
  <div class="table-card anim anim-5">
    <div class="table-head">
      <div>
        <div class="chart-title">Session Log — ${name}</div>
        <div class="chart-subtitle" style="margin-top:4px">Complete measurement history</div>
      </div>
      <span class="chart-badge green">${r.length} session${r.length!==1?'s':''}</span>
    </div>
    <div style="overflow-x:auto">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Date</th>
          <th>Weight (kg)</th>
          <th>Body Fat %</th>
          <th>Visceral Fat</th>
          <th>Wt Change</th>
          <th>Fat % Change</th>
        </tr>
      </thead>
      <tbody>
        ${r.map((row, i) => {
          const prev  = r[i-1];
          const wDelta = prev ? (row.weight - prev.weight).toFixed(1) : null;
          const fDelta = prev ? (row.fat    - prev.fat).toFixed(1)    : null;
          const wPos   = wDelta !== null && parseFloat(wDelta) <= 0;
          const fPos   = fDelta !== null && parseFloat(fDelta) <= 0;
          return `<tr>
            <td style="color:var(--muted)">${i+1}</td>
            <td style="font-weight:500">${fmtDate(row.date)}</td>
            <td style="font-family:'Syne',sans-serif;font-weight:600">${row.weight}</td>
            <td style="font-family:'Syne',sans-serif;font-weight:600;color:var(--orange)">${row.fat}%</td>
            <td style="font-family:'Syne',sans-serif;font-weight:600;color:var(--purple)">${row.visceral}</td>
            <td>${wDelta!==null?`<span class="trend-pill" style="background:${wPos?'var(--green-dim)':'var(--orange-dim)'};color:${wPos?'var(--green)':'var(--orange)'}">${parseFloat(wDelta)>0?'+':''}${wDelta} kg</span>`:'<span style="color:var(--muted)">—</span>'}</td>
            <td>${fDelta!==null?`<span class="trend-pill" style="background:${fPos?'var(--green-dim)':'var(--orange-dim)'};color:${fPos?'var(--green)':'var(--orange)'}">${parseFloat(fDelta)>0?'+':''}${fDelta}%</span>`:'<span style="color:var(--muted)">—</span>'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>
  </div>`;

  // ── RENDER CHARTS ──
  const gridOpts = { color: 'rgba(255,255,255,0.05)', borderColor: 'rgba(255,255,255,0.05)' };
  const tickOpts = { color: '#6b7394', font: { family: 'Inter', size: 11 } };

  function baseOpts(unit) {
    return {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c2030',
          borderColor: '#252a3a',
          borderWidth: 1,
          titleColor: '#e8eaf2',
          bodyColor: '#6b7394',
          padding: 12,
          titleFont: { family: 'Syne', size: 13 },
          callbacks: { label: ctx => ` ${ctx.parsed.y} ${unit}` }
        }
      },
      scales: {
        x: { grid: gridOpts, ticks: tickOpts },
        y: { grid: gridOpts, ticks: tickOpts }
      }
    };
  }

  charts.weight = new Chart(document.getElementById('weightChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: r.map(x => x.weight),
        borderColor: '#00e5a0',
        backgroundColor: 'rgba(0,229,160,0.08)',
        fill: true, tension: 0.45,
        pointBackgroundColor: '#00e5a0',
        pointRadius: 5, pointHoverRadius: 8, borderWidth: 2.5
      }]
    },
    options: baseOpts('kg')
  });

  charts.fat = new Chart(document.getElementById('fatChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: r.map(x => x.fat),
        borderColor: '#ff7043',
        backgroundColor: 'rgba(255,112,67,0.08)',
        fill: true, tension: 0.45,
        pointBackgroundColor: '#ff7043',
        pointRadius: 5, pointHoverRadius: 8, borderWidth: 2.5
      }]
    },
    options: baseOpts('%')
  });

  charts.visceral = new Chart(document.getElementById('visceralChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: r.map(x => x.visceral),
        backgroundColor: r.map(x =>
          x.visceral >= 13 ? 'rgba(255,112,67,0.7)' :
          x.visceral >= 10 ? 'rgba(176,108,255,0.7)' :
                             'rgba(77,159,255,0.7)'
        ),
        borderColor: r.map(x =>
          x.visceral >= 13 ? '#ff7043' :
          x.visceral >= 10 ? '#b06cff' : '#4d9fff'
        ),
        borderWidth: 1.5,
        borderRadius: 6
      }]
    },
    options: baseOpts('level')
  });
}

// ─────────────────────────────────────────
// INIT — load data on page open
// ─────────────────────────────────────────
fetchSheetData();
</script>
</body>
</html>
